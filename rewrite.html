<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lirc Web Remote</title>
  <!-- Disable caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>

function loadScript(src) {
  return new Promise(resolve => {
    const s = document.createElement("script");
    s.src = src + "?ts=" + Date.now();   // ← add timestamp
    s.onload = resolve;
    document.head.appendChild(s);
  });
}

async function loadAllScripts() {
  
  await loadScript("defaults/get_default_display.js.txt");
  await loadScript("defaults/get_default_modules.js.txt");
  await loadScript("js/presshold.js.txt");
  await loadScript("js/execute.js.txt");
  await loadScript("js/refresh.js.txt");
  await loadScript("js/options.js.txt");
  
  // files needed for build_remote
  let rp="js/build_remote/"
  await loadScript(rp + "build_button.js.txt");
  await loadScript(rp + "build_remote.js.txt");
  await loadScript(rp + "build_module.js.txt");
  await loadScript(rp + "catchall_move.js.txt");
  await loadScript(rp + "build_catchall.js.txt");
  
  // files needed for build_edit
  let ep="js/build_edit/"
  await loadScript(ep + "build_activities.js.txt");
  await loadScript(ep + "build_macros.js.txt");
  await loadScript(ep + "build_modules.js.txt");
  await loadScript(ep + "build_displays.js.txt");
  await loadScript(ep + "build_edit.js.txt");
}

function refresh_db() {
 let list=["remotes","displays","activities","macros","modules"];
 refresh(list,run_after_refresh,{});
}

let last_selected="";
function show_selected(sel) {
  // hide all
  groups.forEach(item=> window.divs[item+"_selector"].classList.add("hidden"));
  groups.forEach(item=> window.divs[item+"_display"].classList.add("hidden"));

  // show selected
  if (sel.value === "Refresh") {
    refresh_db();
    window.divs["selector"].value = last_selected;   // restore previous selection
    show_selected(window.divs["selector"]);          // show that panel again
    return;
  }
  last_selected=sel.value;
  window.divs[sel.value + "_selector"].classList.remove("hidden");
  window.divs[sel.value + "_display"].classList.remove("hidden");
}

function run_after_refresh(list, db_in)
{
  db_in.all_modules = {
    ...db_in.modules,
    ...get_default_modules()
  };

  const db = JSON.parse(JSON.stringify(db_in));
  window.db = db;

  let select = "Activities";

  if (!options_from_keys(window.divs["Activities_selector"], db.activities)) select = "Remotes";
  if (!options_from_keys(window.divs["Remotes_selector"], db.remotes)) select = "Edit";
  if (last_selected !== "") select = last_selected;

  window.divs["selector"].value = select;
  groups.forEach(item => load(window.divs[item + "_selector"]));
  show_selected(window.divs["selector"]);
}

function load(__selector) {
  const type = __selector.id.replace("_selector", "");
  const display_dom = window.divs[type + "_display"];

  display_dom.replaceChildren();

  let activity;
  switch (type) {
    case "Edit":
      display_dom.appendChild(build_edit(db, __selector.value));
      return;
    case "Activities":
      activity = db[__selector.value] || { remotes: [], display: "" };
      break;
    case "Remotes":
      activity = { remotes: [__selector.value], display_name: "default_display" };
      break;
    default:
      console.warn("Unknown selector type:", type);
      return;
  }
  display_dom.appendChild(build_remote(db, activity));
}


/*find and globalize*/
function fg(id) {
  if(!window["divs"]){window["divs"]={};}
  const el = document.getElementById(id);
  if (!el) {
    console.warn(`fg: No element found with id="${id}"`);
    return null;
  }
  window.divs[id] = el;
  return el;
}

const groups=["Activities","Remotes","Edit"];
const editOptions = ["Activities","Macros","Modules","Displays"];
let activity_display=null;
window.addEventListener("load", async function () {
  await loadAllScripts();
  let bodyElement = document.body;
  let selectors = document.createElement("div");
  let displays = document.createElement("div");
  let selector = document.createElement("select");
  selector.id = "selector";
  selector.setAttribute("onchange", "show_selected(this)");
  selectors.appendChild(selector); 
  groups.forEach(item => {
    let selector = document.createElement("select");
    selector.id = item + "_selector"
    selector.className="hidden"
    selector.setAttribute("onchange","load(this)")
    selectors.appendChild(selector);
    let display = document.createElement("div");
    display.id = item + "_display"
    display.className="hidden"
    displays.appendChild(display);
  });
  bodyElement.appendChild(selectors);
  bodyElement.appendChild(displays); 
  ["selector", ...groups.flatMap(g => [g + "_selector", g + "_display"])]
   .forEach(id => fg(id));
  options_from_list(window.divs["selector"],[...groups,"Refresh"]);
  options_from_list(window.divs["Edit_selector"],editOptions)
  refresh_db()
});

</script>
<link rel="stylesheet" href="css/remote.css?ts=1">
</head>

</html>
