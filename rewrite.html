<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="./js/build_remote/build_remote.js"></script>
  <script src="./js/build_remote/build_edit.js"></script>
  <script src="./js/refresh.js"></script>
  <script>
function refresh_db()
{
 let list=["remotes","displays","activities","macros","modules"];
 refresh(list,run_after_refresh);
}

function options_from_keys(selector, json) {
  selector.replaceChildren(); // clear existing options

  const keys = Object.keys(json);

  if (keys.length === 0) {
    const opt = document.createElement("option");
    opt.textContent = "None";
    opt.value = "";
    opt.disabled = true;
    opt.selected = true;
    selector.appendChild(opt);
    return;
  }

  keys.forEach(key => {
    const opt = document.createElement("option");
    opt.textContent = key;
    opt.value = key;
    selector.appendChild(opt);
  });
}


function run_after_refresh(list,db)
{
  window.db=db
  options_from_keys(Remotes_selector,db["remotes"]);
  options_from_keys(Activities_selector,db["activities"]);
}

function load(selector)
{activity_display.innerHTML=""
 activity_display.appendChild(build_remote(selector.value));
}

let groups=["Activites","Remotes"];
let activity_display=null;
window.addEventListener("load", function () {
 var bodyElement = document.body;
 bodyElement.appendChild(navigator_location);
 bodyElement.appendChild(remote_location);
 groups.forEach((item)=>{fg(item,"_selector")})
 groups.forEach((item)=>{fg(item,"_display")})
 refresh_list()
})


/*find and globalize*/
function fg(name, post = "") {
  const id = name + post;
  const el = document.getElementById(id);

  if (!el) {
    console.warn(`fg: No element found with id="${id}"`);
    return null;
  }

  window[id] = el;
  return el;
}
</script>
</head>
<body>
<div>
  <select id="selector" onchange="show_selected(this)">
    <option value="Activities">Activities</option>
    <option value="Remotes">Remotes</option>
    <option value="Edit">Edit</option>
    <option value="Refresh">refresh</option>
  </select>
  <select class="hidden" id="Activity_selector" onchange="load"></select>
  <select class="hidden" id="Remote_selector" onchange="load"></select>
  <select class="hidden" id="Edit_selector" onchange="load">
    <option value="Activites">Activites</option>
    <option value="Macros">Macros</option>
    <option value="Modules">Modules</option>
    <option value="Displays">Displays</option>
  </select>
</div><br>
<div class="hidden" id="Activity_display"></div>
<div class="hidden" id="Remote_display"></div>
<div class="hidden" id="Edit_display"></div>
</body>
</html>
