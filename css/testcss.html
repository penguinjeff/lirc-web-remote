<!DOCTYPE html>
<html>
<head>
<style>

:root {
    --scale: 1;
}

.container {
    display: flex;
    gap: 10px;
    background: #333;
    padding: 10px;
}

/* Old working class */
.numberpads {
    width: calc(70px * var(--scale));
    background-color: #878787;
}

/* Your new class */
.one_button_horizantal_filler {
    width: calc(70px * var(--scale));
    background-color: #878787;
}

/* Visual debugging */
.numberpads,
.one_button_horizantal_filler {
    outline: 2px solid red;
    color: white;
    font-family: sans-serif;
    padding: 10px;
}

</style>
</head>
<body>

<div class="container">
    <div class="numberpads">OLD MODULE</div>
    <div class="one_button_horizantal_filler">NEW FILLER</div>
</div>

</body>
</html>
