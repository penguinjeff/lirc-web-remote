<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IR Macro Builder</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    select, input { margin: 5px 0; display: block; }
    .cmd { padding: 5px; border-bottom: 1px solid #ccc; }
    .cmd button { margin-left: 10px; }
  </style>
</head>
<body>

<h2>IR Macro Builder</h2>

<!-- Macro selection -->
<label>Existing Macros:</label>
<select id="macro-select"></select>
<button id="load-macro">Load Macro</button>
<button id="new-macro">New Macro</button>

<hr>

<!-- Command builder -->
<h3>Add IR Command</h3>

<label>Remote:</label>
<select id="remote-select"></select>

<label>Command:</label>
<select id="command-select"></select>

<label>Delay (ms):</label>
<input type="number" id="delay" value="0">

<label>Loops:</label>
<input type="number" id="loops" value="1">

<button id="add-command">Add Step</button>

<hr>

<!-- Macro editor -->
<h3>Macro Steps</h3>
<div id="macro-steps"></div>

<hr>

<!-- Save macro -->
<label>Macro Name:</label>
<input type="text" id="macro-name">

<button id="save-macro">Save Macro</button>

<h3>Updated Macros Object</h3>
<pre id="output"></pre>

<script>
/* -----------------------------
   Your auto-generated functions
------------------------------ */

function get_remotes() {
  return {
    "Logitech_Roku":["Vudu","KEY_SLEEP","Instant_Replay","Crackle","KEY_BACK","Asterisk","KEY_FASTFORWARD","Pandora","Showtime","HBO","Hulu","KEY_PLAYPAUSE","Netflix","Vix","Discovery_Plus","KEY_FASTREWIND","KEY_DOWN","KEY_RIGHT","KEY_OK","SlingTv","MGO","KEY_LEFT","LiveTV","KEY_UP","Disney","Fango","KEY_HOME","KEY_EXIT","RedBull","Spotify","TED","Starz","Amazon","Streaming_Store","NBA","Feature_Free","Directtv","Yupp","Roku","ParamountPlus","Fubo","Apple","Estresllatv","CW","HappyKids","ESPN","Rdio","Youtube","PageDown"],

    "Logitech_Samsung":["KEY_POWERON","KEY_POWEROFF","KEY_POWER","KEY_A","KEY_B","KEY_C","KEY_D","Aspect","KEY_RETURN","16x9","Channel_list","4x3","CC","Dynamic","Favorite","KEY_AV1","KEY_AV2","Input_Computer1","Input_Computer2","KEY_HDMI1","KEY_HDMI2","KEY_HDMI3","KEY_HDMI4","KEY_PC","KEY_TV","MediaP","Movie","MTS","KEY_PICTURE_MODE","KEY_SLEEP","SmartHub","KEY_SOUND_MODE","KEY_SOURCE","Standard","Tools","Yahoo","KEY_MENU","KEY_INFO","KEY_OK","KEY_EXIT","KEY_RED","KEY_GREEN","KEY_YELLOW","KEY_BLUE","KEY_VOLUMEUP","KEY_VOLUMEDOWN","KEY_MUTE","KEY_CHANNELPREVIOUS","KEY_CHANNELUP","KEY_CHANNELDOWN","KEY_UP","KEY_DOWN","KEY_LEFT","KEY_RIGHT","KEY_FASTREWIND","KEY_FASTFORWARD","KEY_PLAY","KEY_PAUSE","KEY_RECORD","KEY_STOP","KEY_1","KEY_2","KEY_3","KEY_4","KEY_5","KEY_6","KEY_7","KEY_8","KEY_9","KEY_0","KEY_MINUS"],

    "Logitech_Denon":["KEY_POWERON","KEY_POWEROFF","KEY_VOLUMEDOWN","KEY_VOLUMEUP","KEY_BLURAY","KEY_DOCK","KEY_AM","KEY_DVD","KEY_FM","KEY_GAME","KEY_TUNER","KEY_SATCBL","KEY_TV","KEY_IPOD","KEY_VAUX","KEY_MUTE"]
  };
}

function get_macros() {
  return {
    "Roku_On":[["Logitech_Samsung","KEY_POWERON",0,"2"],["Logitech_Denon","KEY_POWERON",0,"1"]],
    "All Off":{"ircodes":[["Logitech_Samsung","KEY_POWEROFF",0,"1"],["Logitech_Denon","KEY_POWEROFF",0,"1"]]},
    "TV":[["Logitech_Samsung","KEY_POWERON",0,"1"],["Logitech_Samsung","KEY_TV","10000","1"]],
    "Macro6":[["none","none","1000","0"]]
  };
}

/* -----------------------------
   UI Logic
------------------------------ */

let remotes = get_remotes();
let macros = get_macros();
let currentMacro = [];

const macroSelect = document.getElementById("macro-select");
const remoteSelect = document.getElementById("remote-select");
const commandSelect = document.getElementById("command-select");

/* Populate remotes */
Object.keys(remotes).forEach(remote => {
  const opt = document.createElement("option");
  opt.value = remote;
  opt.textContent = remote;
  remoteSelect.appendChild(opt);
});

/* Populate commands when remote changes */
remoteSelect.addEventListener("change", () => {
  const remote = remoteSelect.value;
  commandSelect.innerHTML = "";
  remotes[remote].forEach(cmd => {
    const opt = document.createElement("option");
    opt.value = cmd;
    opt.textContent = cmd;
    commandSelect.appendChild(opt);
  });
});
remoteSelect.dispatchEvent(new Event("change"));

/* Populate macro list */
Object.keys(macros).forEach(name => {
  const opt = document.createElement("option");
  opt.value = name;
  opt.textContent = name;
  macroSelect.appendChild(opt);
});

/* Load macro */
document.getElementById("load-macro").addEventListener("click", () => {
  const name = macroSelect.value;
  const macro = macros[name];
  currentMacro = Array.isArray(macro) ? macro : macro.ircodes;
  document.getElementById("macro-name").value = name;
  renderMacro();
});

/* New macro */
document.getElementById("new-macro").addEventListener("click", () => {
  currentMacro = [];
  document.getElementById("macro-name").value = "";
  renderMacro();
});

/* Add step */
document.getElementById("add-command").addEventListener("click", () => {
  const remote = remoteSelect.value;
  const command = commandSelect.value;
  const delay = document.getElementById("delay").value;
  const loops = document.getElementById("loops").value;

  currentMacro.push([remote, command, delay, loops]);
  renderMacro();
});

/* Render macro steps */
function renderMacro() {
  const container = document.getElementById("macro-steps");
  container.innerHTML = "";

  currentMacro.forEach((cmd, index) => {
    const div = document.createElement("div");
    div.className = "cmd";
    div.textContent = JSON.stringify(cmd);

    const del = document.createElement("button");
    del.textContent = "Delete";
    del.onclick = () => {
      currentMacro.splice(index, 1);
      renderMacro();
    };

    div.appendChild(del);
    container.appendChild(div);
  });
}

/* Save macro */
document.getElementById("save-macro").addEventListener("click", () => {
  const name = document.getElementById("macro-name").value.trim();
  if (!name) {
    alert("Enter a macro name");
    return;
  }

  macros[name] = currentMacro;

  document.getElementById("output").textContent =
    JSON.stringify(macros, null, 2);
});
</script>

</body>
</html>
