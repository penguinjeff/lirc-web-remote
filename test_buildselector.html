// ------------------------------------------------------------
// Load a script with timestamp to avoid caching
// ------------------------------------------------------------

/*=====================================*
 * example1:
  await include("build_item_directory",".js.txt",["subfn1","subfn2"]
 
  should be the same as
  await include("build_item_directory/subfn1.js.txt")
  await include("build_item_directory/subfn2.js.txt")
  
  
  example 2:
  
  const tree = {
    utils: {
      math: { add:{}, subtract:{} },
      string: { trim:{}, split:{} }
    },
    components: {
      button:{}, slider:{}
    }
  };

  alternately

  const tree = {
    utils: {
      math: [ "dd", "subtract" ],
      string: [ "trim" , "split" ]
    },
    components: [ "button" , "slider" ]
  };

  await include("js", ".js", tree);

  should be the same as
  
  await include("js/utils/math/add.js")
  await include("js/utils/math/subtract.js")
  await include("js/utils/string/trim.js")
  await include("js/utils/string/split.js")
  await include("js/components/button.js")
  await include("js/components/slider.js")

future planning ideas
 - duplicate‑load prevention
 - debug logging
 - parallel loading mode
 - extension auto‑detection
 - plugin injection
 - lazy loading
 - hot reload support

 *=====================================*/
async function include(src, extension = "", multiple = []) {

  // ------------------------------------------------------------
  // CASE 1: multiple is an ARRAY → list of files
  // ------------------------------------------------------------
  if (Array.isArray(multiple) && multiple.length > 0) {
    for (const item of multiple) {
      console.log(src + "/" + item + extension);
      await include(src + "/" + item, extension);
    }
    return;
  }

  // ------------------------------------------------------------
  // CASE 2: multiple is a NON-EMPTY OBJECT → directory tree
  // ------------------------------------------------------------
  if (
    multiple &&
    typeof multiple === "object" &&
    !Array.isArray(multiple) &&
    Object.keys(multiple).length > 0
  ) {
    for (const key of Object.keys(multiple)) {
      const value = multiple[key];

      // Array → list of files
      if (Array.isArray(value)) {
        await include(src + "/" + key, extension, value);
      }

      // Non-empty object → directory
      else if (value && typeof value === "object" && Object.keys(value).length > 0) {
        await include(src + "/" + key, extension, value);
      }

      // Empty object → file
      else {
        await include(src + "/" + key, extension, null);
      }
    }
    return;
  }

  // ------------------------------------------------------------
  // CASE 3: single file include
  // ------------------------------------------------------------
  
  return new Promise(resolve => {
    const s = document.createElement("script");
    s.src = src + extension + "?ts=" + Date.now();
    s.onload = resolve;
    document.head.appendChild(s);
  });
}

// ------------------------------------------------------------
// Dummy function — receives only the event
// ------------------------------------------------------------
function dummy_action(event) {
  const target = event.target;

  // Find the selector root using your NEW class name
  const root = target.closest(".itemSelector");
  if (!root) {
    console.log("No .itemSelector root found");
    return;
  }

  const section = root.getAttribute("name");

  console.log("Dummy function triggered by:", target.name || target.textContent);
  console.log("Selector section:", section);

  // Get all checkboxes inside this selector
  const checkboxes = root.querySelectorAll(".itemSelector_checkbox");

  // Collect selected items
  const selected = [...checkboxes]
    .filter(cb => cb.checked)
    .map(cb => cb.value);

  // Pretty output
  console.log("====================================");
  console.log(" Selected items:", selected.length);
  selected.forEach(item => console.log("  •", item));
  console.log("====================================");
}
