<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Catchall Test Page</title>

  <!-- Disable caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Your stylesheet -->
  <link rel="stylesheet" href="css/remote.css?ts=6">
</head>

<body>

  <h2>Catchall Test Page</h2>

  <!-- Simulated remote layout -->
  <div class="container">
    <div class="container-1">
      <div class="catchall" id="catchall_test">
        <!-- build_catchall will fill THIS .common div -->
        <div class="common" id="catchall_root"></div>
      </div>
    </div>
  </div>

  <!-- Load your builder + dependencies -->
  <script src="js/execute.js"></script>
  <script src="js/presshold.js"></script>
  <script src="js/build_button.js.txt"></script>

  <!-- Catchall builder modules -->
<script src="js/build_catchall/catchall_move.js.txt"></script>
<script src="js/build_catchall/build_catchall.js.txt"></script>

  <script>
    // ------------------------------------------------------------
    // 1. Generate test button list: KEY_A through KEY_Z
    // ------------------------------------------------------------
    const testButtons = [];
    for (let i = 0; i < 26; i++) {
      const letter = String.fromCharCode(65 + i); // A-Z
      testButtons.push("KEY_" + letter + "_with_a_long_name");
    }

    // ------------------------------------------------------------
    // 2. Create the state object expected by build_catchall
    // ------------------------------------------------------------
	const extra = {
	  button_columns: 5,   // visible columns
      button_rows: 3,      // rows per column
	  alldef:'unused'
	}
    const state = {
      dom: document.getElementById("catchall_root"),
      extra:extra,
      offset: 0,
      realCount: 0,
      strip: null,
	  remote:"TestRemote",
	  unused_buttons:testButtons,
	  remote_buttons:testButtons,
    };
    // ------------------------------------------------------------
    // 3. Call your builder
    // ------------------------------------------------------------
	
    build_catchall(state);
  </script>

</body>
</html>
