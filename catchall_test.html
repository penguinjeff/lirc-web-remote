<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Catchall Test Page</title>

  <!-- Disable caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Your stylesheet -->
  <link rel="stylesheet" href="css/remote.css?ts=6">
  <script>

function loadScript(src) {
  return new Promise(resolve => {
    const s = document.createElement("script");
    s.src = src + "?ts=" + Date.now();   // ← add timestamp
    s.onload = resolve;
    document.head.appendChild(s);
  });
}

async function loadAllScripts() {
  await loadScript("js/presshold.js.txt");
  await loadScript("js/execute.js.txt");
  // files needed for build_remote
  let rp="js/build_remote/"
  await loadScript(rp + "build_button.js.txt");
  await loadScript(rp + "catchall_move.js.txt");
  await loadScript(rp + "build_catchall.js.txt");
}
window.addEventListener("load", async function () {
    // ------------------------------------------------------------
    // 1. Generate test button list: KEY_A through KEY_Z
    // ------------------------------------------------------------
    const testButtons = [];
    for (let i = 0; i < 26; i++) {
      const letter = String.fromCharCode(65 + i); // A-Z
      testButtons.push("KEY_" + letter + "_with_a_long_name");
    }

    // ------------------------------------------------------------
    // 2. Create the state object expected by build_catchall
    // ------------------------------------------------------------
	const extra = {
	  button_columns: 5,   // visible columns
      button_rows: 3,      // rows per column
	  alldef:'unused'
	}
    const state = {
      dom: document.getElementById("catchall_root"),
      extra:extra,
      offset: 0,
      realCount: 0,
      strip: null,
	  remote:"TestRemote",
	  unused_buttons:testButtons,
	  remote_buttons:testButtons,
    };
    // ------------------------------------------------------------
    // 3. Call your builder
    // ------------------------------------------------------------

  await loadAllScripts();
  build_catchall(state);
});
  </script>
</head>

<body>

  <h2>Catchall Test Page</h2>

  <!-- Simulated remote layout -->
  <div class="container">
    <div class="container-1">
      <div class="catchall" id="catchall_test">
        <!-- build_catchall will fill THIS .common div -->
        <div class="common" id="catchall_root"></div>
      </div>
    </div>
  </div>
</body>
</html>
