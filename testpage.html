<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <!-- Load cjson2dom engine + shapes FIRST -->
    <script src="js/cjson2dom/load.js"></script>

    <!-- Your timestamp script -->
    <script src="js/timestamp.js"></script>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const model = {
                linka: {
                    url: "https://example.com",
                    label: "Click me ( {url} )"
                }
            };

            document.getElementById("test-area")
                .appendChild(cjson2dom(model));
        });
    </script>
</head>

<body>
    <h1>Test</h1>
    <div id="test-area"></div>
</body>
</html>
